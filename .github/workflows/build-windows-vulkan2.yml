name: Build Windows Vulkan whisper.cpp

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 支持手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 缓存 Vulkan SDK 避免重复下载
      - name: Cache Vulkan SDK
        uses: actions/cache@v3
        with:
          path: C:\VulkanSDK
          key: vulkan-sdk-windows-1.3.268

      - name: Install Vulkan SDK
        run: |
          choco install vulkan-sdk --version=1.3.268.0 --no-progress
        shell: pwsh

      - name: Setup MSVC Build Tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake (Vulkan + MiniAudio ON)
        run: |
          mkdir build
          cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DWHISPER_VULKAN=ON `
            -DWHISPER_USE_MA=ON `
            -DWHISPER_BUILD_EXAMPLES=ON `
            -DBUILD_SHARED_LIBS=OFF
        shell: pwsh

      - name: Build Release binaries
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      # 整理输出产物
      - name: Collect build artifacts
        run: |
          mkdir -p artifact/bin
          mkdir -p artifact/lib
          # 复制可执行文件
          copy build\bin\Release\*.exe artifact\bin\
          # 复制静态库
          copy build\Release\whisper.lib artifact\lib\
          # 复制 Vulkan/miniaudio 依赖dll
          copy C:\VulkanSDK\1.3.268\Bin\*.dll artifact\bin\
        shell: pwsh

      # 上传制品，可在 Action 页面下载
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whisper-windows-vulkan-x64
          path: artifact/
          retention-days: 14
